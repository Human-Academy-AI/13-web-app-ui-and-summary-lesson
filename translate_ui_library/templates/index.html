<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>多言語翻訳アプリ - Bootstrap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./static/style.css" />
  </head>
  <body>
    <main class="app container py-5">
      <header class="hero mb-4">
        <span class="badge text-uppercase">Bootstrap UI</span>
        <h1 class="display-6">多言語翻訳アプリ</h1>
        <p class="lead">Bootstrap を使った教材用 UI です。コンポーネントで素早く整えられます。</p>
      </header>

      <section class="panel p-4">
        <div class="row g-4">
          <div class="col-lg-6 order-1">
            <div class="card h-100 shadow-sm">
              <div class="card-body d-flex flex-column gap-3">
                <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
                  <h2 class="h5 mb-0">翻訳元</h2>
                  <label class="form-label small text-muted mb-0">
                    言語
                    <select id="source-language" class="form-select form-select-sm mt-1">
                      <option value="ja">日本語</option>
                      <option value="en">英語</option>
                      <option value="es">スペイン語</option>
                      <option value="fr">フランス語</option>
                    </select>
                  </label>
                </div>
                <textarea id="input-text" class="form-control" rows="8" placeholder="ここに翻訳したい文章を入力してください"></textarea>
              </div>
            </div>
          </div>

          <div class="col-12 order-2 order-lg-3">
            <div class="d-grid d-sm-flex align-items-sm-center gap-3 actions">
              <button class="btn btn-primary px-4" onclick="translateText()">翻訳する</button>
              <p class="text-muted small mb-0">API 連携が完了していない場合は結果が表示されません。</p>
            </div>
          </div>

          <div class="col-lg-6 order-3 order-lg-2">
            <div class="card h-100 shadow-sm">
              <div class="card-body d-flex flex-column gap-3">
                <div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
                  <h2 class="h5 mb-0">翻訳先</h2>
                  <label class="form-label small text-muted mb-0">
                    言語
                    <select id="target-language" class="form-select form-select-sm mt-1">
                      <option value="en">英語</option>
                      <option value="ja">日本語</option>
                      <option value="es">スペイン語</option>
                      <option value="fr">フランス語</option>
                    </select>
                  </label>
                </div>
                <textarea id="output-text" class="form-control" rows="8" placeholder="翻訳結果がここに表示されます" readonly></textarea>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/axios@1.4.0/dist/axios.min.js"></script>
    <script src="./static/main.js"></script>
  </body>
</html>
